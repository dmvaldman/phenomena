<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>J-lens visualizer</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 16px; background: #fafafa; color: #222; }
  .session { border-left: 3px solid #ddd; padding-left: 10px; margin-bottom: 22px; }
  .bubble { padding: 8px 12px; border-radius: 10px; margin: 10px 0; max-width: 72ch;
            white-space: pre-wrap; font-size: 14px; line-height: 1.45; }
  .user { background: #dbe7ff; }
  .assistant { background: #e8e8e8; }
  .replyrow { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .probeform { display: flex; gap: 6px; align-items: center; }
  .probeform input { font-size: 13px; padding: 5px; width: 140px; }
  .probeform button { font-size: 13px; padding: 5px 10px; }
  .probeform .pstatus { color: #888; font-size: 12px; }
  .gridwrap { overflow: auto; max-height: 70vh; border: 1px solid #ddd; background: #fff; margin: 8px 0; }
  table { border-collapse: collapse; font-size: 11px; }
  th, td { border: 1px solid #eee; padding: 2px 4px; white-space: nowrap; max-width: 86px;
           overflow: hidden; text-overflow: ellipsis; }
  th { background: #f0f0f0; position: sticky; top: 0; z-index: 2; font-size: 11px; }
  th.gen { background: #d9f2d9; }
  td.layer { background: #f0f0f0; position: sticky; left: 0; font-weight: 600; z-index: 1; }
  td.psep { background: #e8e4f5; font-weight: 600; position: sticky; left: 0; }
  td.pcell { height: 9px; padding: 0; }
  .composer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 14px 0; }
  .composer input.msg { flex: 1; min-width: 380px; font-size: 14px; padding: 8px; }
  select, input[type=text] { font-size: 14px; padding: 6px; }
  button { font-size: 14px; padding: 6px 14px; cursor: pointer; }
  .composer.archived input.msg, .composer.archived .temp, .composer.archived .send,
  .composer.archived .newchat, .composer.archived .tmpl {
    opacity: 0.45; pointer-events: none; }
  .status { color: #888; font-size: 13px; }
  #tip { position: fixed; display: none; background: #222; color: #fff; padding: 6px 9px;
         border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 10; line-height: 1.5; }
  #tip .p { color: #9cf; } #tip .r { color: #fc9; }
</style>
</head>
<body>
<div id="chats"></div>
<div id="tip"></div>
<script>
const tip = document.getElementById("tip");
const API = location.protocol === "file:" ? "http://localhost:7860" : "";

const VIRIDIS = [[68,1,84],[72,36,117],[65,68,135],[53,95,141],[42,120,142],[33,145,140],[34,168,132],[68,191,112],[122,209,81],[189,223,38],[253,231,37]];
function viridis(t) {
  t = Math.max(0, Math.min(1, t));
  const x = t * (VIRIDIS.length - 1), i = Math.floor(x), f = x - i;
  const a = VIRIDIS[i], b = VIRIDIS[Math.min(i + 1, VIRIDIS.length - 1)];
  return `rgb(${Math.round(a[0]+f*(b[0]-a[0]))},${Math.round(a[1]+f*(b[1]-a[1]))},${Math.round(a[2]+f*(b[2]-a[2]))})`;
}
function heatColor(p) {
  const a = Math.min(1, Math.pow(p, 0.4));
  return `rgba(40, 90, 200, ${(0.08 + 0.72 * a).toFixed(3)})`;
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/ /g,"·"); }
function showTip(e, html) {
  tip.innerHTML = html;
  tip.style.display = "block";
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 220) + "px";
  tip.style.top = Math.min(e.clientY + 14, window.innerHeight - 150) + "px";
}
function topHtml(d, l, t) {
  return d.grid[l][t].map(x => `${esc(x.tok)} <span class="p">${(x.p*100).toFixed(1)}%</span>`).join("<br>");
}

function buildTable(d) {
  const T = d.tokens.length;
  let html = "<table><tr><th>layer</th>" +
      d.tokens.map((t, i) => `<th class="${d.roles[i] ? "gen" : ""}">${esc(t)}</th>`).join("") + "</tr>";
  for (let l = 0; l < d.n_layers; l++) {
    html += `<tr><td class="layer">L${l}</td>`;
    for (let t = 0; t < T; t++) {
      html += `<td data-l="${l}" data-t="${t}" style="background:${heatColor(d.grid[l][t][0].p)}">${esc(d.grid[l][t][0].tok)}</td>`;
    }
    html += "</tr>";
  }
  html += "</table>";
  const wrap = document.createElement("div");
  wrap.className = "gridwrap";
  wrap.innerHTML = html;
  const table = wrap.querySelector("table");
  table.querySelectorAll("td[data-l]").forEach(td => {
    td.onmousemove = e => {
      const l = +td.dataset.l, t = +td.dataset.t;
      showTip(e, `<b>L${l} · pos ${d.skip + t} (${esc(d.tokens[t])})</b><br>` + topHtml(d, l, t));
    };
    td.onmouseleave = () => tip.style.display = "none";
  });
  return {wrap, table};
}

function appendProbeBlock(turn, d, probeStr) {
  const T = d.tokens.length, L = d.n_layers;
  const vmax = Math.max(...d.probe_scores.flat());
  let html = `<tr class="pblock"><td class="psep" colspan="${T + 1}">probe ${esc(probeStr)} — conceptness, max ${vmax.toPrecision(2)}</td></tr>`;
  for (let l = 0; l < L; l++) {
    html += `<tr class="pblock"><td class="layer">L${l}</td>`;
    for (let t = 0; t < T; t++) {
      const v = d.probe_scores[l][t];
      html += `<td class="pcell" data-pl="${l}" data-pt="${t}" style="background:${viridis(vmax > 0 ? v / vmax : 0)}"></td>`;
    }
    html += "</tr>";
  }
  turn.table.insertAdjacentHTML("beforeend", html);
  const rows = [...turn.table.querySelectorAll("tr.pblock")].slice(-(L + 1));
  rows.forEach(tr => tr.querySelectorAll("td.pcell").forEach(td => {
    td.onmousemove = e => {
      const l = +td.dataset.pl, t = +td.dataset.pt;
      showTip(e, `<b>${esc(probeStr)} · L${l} · pos ${d.skip + t} (${esc(d.tokens[t])})</b><br>` + topHtml(d, l, t) +
          `<br><span class="r">conceptness: ${d.probe_scores[l][t].toPrecision(3)} · rank: ${d.probe_ranks[l][t]}</span>`);
    };
    td.onmouseleave = () => tip.style.display = "none";
  }));
}

function newSession(defaults) {
  const s = { messages: [], shownTokens: 0, turns: [], archived: false };
  const root = document.createElement("div");
  root.className = "session";
  const content = document.createElement("div");
  const composer = document.createElement("div");
  composer.className = "composer";
  composer.innerHTML = `
    <input class="msg" placeholder="Message (e.g. Name a sport. Answer in one word.)"/>
    <select class="lens"><option value="jlens">J-lens</option><option value="logit">logit lens</option></select>
    <label class="tmpl"><input class="template" type="checkbox" checked> chat template</label>
    <label class="temp">temp <input class="tempval" type="text" value="1" size="3"></label>
    <button class="send">send</button>
    <button class="newchat">new chat</button>
    <span class="status"></span>`;
  root.appendChild(content);
  root.appendChild(composer);
  document.getElementById("chats").appendChild(root);
  const el = c => composer.querySelector(c);
  if (defaults) {
    el(".lens").value = defaults.lens;
    el(".template").checked = defaults.template;
    el(".tempval").value = defaults.temp;
  }

  function addBubble(role, text) {
    const div = document.createElement("div");
    div.className = "bubble " + role;
    div.textContent = text;
    content.appendChild(div);
    return div;
  }

  async function post(body) {
    const r = await fetch(`${API}/api/chat`, {method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function runProbe(turn, probeStr, statusEl) {
    if (!probeStr.trim()) return;
    statusEl.textContent = "probing…";
    try {
      const d = await post({messages: s.messages.slice(0, turn.end), lens: el(".lens").value,
        probe: probeStr, template: turn.template, skip_tokens: turn.skip, reuse_reply: true});
      appendProbeBlock(turn, d, d.probe_token || probeStr);
      if (!turn.probes.includes(probeStr)) turn.probes.push(probeStr);
      turn.wrap.scrollTop = turn.wrap.scrollHeight;   // reveal the new block
      turn.wrap.scrollIntoView({behavior: "smooth", block: "nearest"});
      statusEl.textContent = `added "${(d.probe_token || probeStr).trim()}"`;
    } catch (e) {
      statusEl.textContent = "error: " + e.message;
    }
  }

  function addProbeForm(turn) {
    const form = document.createElement("span");
    form.className = "probeform";
    form.innerHTML = `<input placeholder="probe token (e.g. ' car')"/><button>probe</button><span class="pstatus"></span>`;
    const input = form.querySelector("input"), btn = form.querySelector("button"),
          st = form.querySelector(".pstatus");
    const go = () => { runProbe(turn, input.value, st); input.select(); };
    btn.onclick = go;
    input.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
    return form;
  }

  async function send() {
    const text = el(".msg").value.trim();
    if (!text || s.archived) return;
    s.messages.push({role: "user", content: text});
    addBubble("user", text);
    el(".msg").value = "";
    el(".status").textContent = "running…";
    el(".send").disabled = true;
    try {
      const d = await post({messages: s.messages, lens: el(".lens").value, probe: "",
        template: el(".template").checked,
        temperature: parseFloat(el(".tempval").value) || 0, skip_tokens: s.shownTokens});
      const {wrap, table} = buildTable(d);
      content.appendChild(wrap);
      s.messages.push({role: "assistant", content: d.reply});
      const turn = {end: s.messages.length, skip: d.skip, template: el(".template").checked,
                    wrap, table, probes: []};
      s.turns.push(turn);
      s.shownTokens = d.total_tokens;
      const row = document.createElement("div");
      row.className = "replyrow";
      const bub = document.createElement("div");
      bub.className = "bubble assistant";
      bub.textContent = d.reply;
      row.appendChild(bub);
      row.appendChild(addProbeForm(turn));
      content.appendChild(row);
      el(".status").textContent = `${d.tokens.length} new tokens × ${d.n_layers} layers — temp ${d.temperature}, seed ${d.seed}`;
      el(".status").title = d.prompt_used;
    } catch (e) {
      el(".status").textContent = "error: " + e.message;
      s.messages.pop();
    } finally {
      el(".send").disabled = false;
      composer.scrollIntoView({behavior: "smooth"});
    }
  }

  async function relensAll() {
    if (!s.turns.length) return;
    el(".status").textContent = "re-reading…";
    try {
      for (const turn of s.turns) {
        const d = await post({messages: s.messages.slice(0, turn.end), lens: el(".lens").value,
          probe: "", template: turn.template, skip_tokens: turn.skip, reuse_reply: true});
        const {wrap, table} = buildTable(d);
        turn.wrap.replaceWith(wrap);
        turn.wrap = wrap; turn.table = table;
        for (const p of turn.probes) {
          const dp = await post({messages: s.messages.slice(0, turn.end), lens: el(".lens").value,
            probe: p, template: turn.template, skip_tokens: turn.skip, reuse_reply: true});
          appendProbeBlock(turn, dp, dp.probe_token || p);
        }
      }
      el(".status").textContent = `re-read with ${el(".lens").value}`;
    } catch (e) {
      el(".status").textContent = "error: " + e.message;
    }
  }

  function archive() {
    if (s.archived) return;
    s.archived = true;
    composer.classList.add("archived");
    newSession({lens: el(".lens").value, template: el(".template").checked,
                temp: el(".tempval").value});
  }

  el(".send").onclick = send;
  el(".newchat").onclick = archive;
  el(".lens").onchange = relensAll;
  el(".msg").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  el(".msg").focus();
  return s;
}

newSession();
</script>
</body>
</html>
