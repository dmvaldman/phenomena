<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>J-lens visualizer</title>
<style>
  body { font-family: -apple-system, sans-serif; margin: 16px; background: #fafafa; color: #222; }
  .session { border-left: 3px solid #ddd; padding-left: 10px; margin-bottom: 22px; }
  .bubble { padding: 8px 12px; border-radius: 10px; margin: 10px 0; max-width: 72ch;
            white-space: pre-wrap; font-size: 14px; line-height: 1.45; }
  .user { background: #dbe7ff; }
  .assistant { background: #e8e8e8; }
  .gridwrap { overflow: auto; max-height: 60vh; border: 1px solid #ddd; background: #fff; margin: 8px 0; }
  .heatwrap { overflow-x: auto; border: 1px solid #ddd; background: #fff; margin: 8px 0; padding: 10px 6px 4px 6px; }
  .heatwrap canvas { display: block; }
  .heatlabel { font-size: 11px; color: #666; margin: 2px 0 0 44px; }
  table { border-collapse: collapse; font-size: 11px; }
  th, td { border: 1px solid #eee; padding: 2px 4px; white-space: nowrap; max-width: 86px;
           overflow: hidden; text-overflow: ellipsis; }
  th { background: #f0f0f0; position: sticky; top: 0; z-index: 2; font-size: 11px; }
  th.gen { background: #d9f2d9; }
  td.layer { background: #f0f0f0; position: sticky; left: 0; font-weight: 600; z-index: 1; }
  .composer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 14px 0; }
  .composer input.msg { flex: 1; min-width: 380px; font-size: 14px; padding: 8px; }
  select, input[type=text] { font-size: 14px; padding: 6px; }
  button { font-size: 14px; padding: 6px 14px; cursor: pointer; }
  .composer.archived input.msg, .composer.archived .temp, .composer.archived .send,
  .composer.archived .newchat, .composer.archived .tmpl {
    opacity: 0.45; pointer-events: none; }
  .status { color: #888; font-size: 13px; }
  #tip { position: fixed; display: none; background: #222; color: #fff; padding: 6px 9px;
         border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 10; line-height: 1.5; }
  #tip .p { color: #9cf; } #tip .r { color: #fc9; }
</style>
</head>
<body>
<div id="chats"></div>
<div id="tip"></div>
<script>
const tip = document.getElementById("tip");
const API = location.protocol === "file:" ? "http://localhost:7860" : "";

const VIRIDIS = [[68,1,84],[72,36,117],[65,68,135],[53,95,141],[42,120,142],[33,145,140],[34,168,132],[68,191,112],[122,209,81],[189,223,38],[253,231,37]];
function viridis(t) {
  t = Math.max(0, Math.min(1, t));
  const x = t * (VIRIDIS.length - 1), i = Math.floor(x), f = x - i;
  const a = VIRIDIS[i], b = VIRIDIS[Math.min(i + 1, VIRIDIS.length - 1)];
  return `rgb(${Math.round(a[0]+f*(b[0]-a[0]))},${Math.round(a[1]+f*(b[1]-a[1]))},${Math.round(a[2]+f*(b[2]-a[2]))})`;
}
function heatColor(p) {
  const a = Math.min(1, Math.pow(p, 0.4));
  return `rgba(40, 90, 200, ${(0.08 + 0.72 * a).toFixed(3)})`;
}
function scoreColor(v, vmax) {
  const x = vmax > 0 ? Math.sqrt(v / vmax) : 0;
  return `rgba(200, 40, 40, ${(0.04 + 0.86 * x).toFixed(3)})`;
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/ /g,"·"); }

function showTip(e, html) {
  tip.innerHTML = html;
  tip.style.display = "block";
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 220) + "px";
  tip.style.top = Math.min(e.clientY + 14, window.innerHeight - 140) + "px";
}

function buildHeatmap(d) {
  const L = d.n_layers, T = d.tokens.length, vmax = Math.max(...d.probe_scores.flat());
  const cw = Math.max(12, Math.min(22, Math.floor(1000 / T))), ch = 10, mL = 44, mB = 26, mT = 6;
  const wrap = document.createElement("div");
  wrap.className = "heatwrap";
  const canvas = document.createElement("canvas");
  canvas.width = mL + T * cw + 8;
  canvas.height = mT + L * ch + mB;
  wrap.appendChild(canvas);
  const lbl = document.createElement("div");
  lbl.className = "heatlabel";
  lbl.textContent = `probe "${d.probe_token}" conceptness — layer 0 (bottom) to ${L - 1} (top), color scaled to max ${vmax.toPrecision(2)}`;
  wrap.appendChild(lbl);
  const ctx = canvas.getContext("2d");
  for (let l = 0; l < L; l++)
    for (let t = 0; t < T; t++) {
      ctx.fillStyle = viridis(vmax > 0 ? d.probe_scores[l][t] / vmax : 0);
      ctx.fillRect(mL + t * cw, mT + (L - 1 - l) * ch, cw - 1, ch - 1);
    }
  ctx.fillStyle = "#666"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
  for (let l = 0; l < L; l += 8) ctx.fillText(`L${l}`, mL - 5, mT + (L - 1 - l) * ch + ch);
  ctx.textAlign = "center";
  for (let t = 0; t < T; t += 5) ctx.fillText(String(d.skip + t), mL + t * cw + cw / 2, mT + L * ch + 14);
  canvas.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    const t = Math.floor((e.clientX - r.left - mL) / cw);
    const l = L - 1 - Math.floor((e.clientY - r.top - mT) / ch);
    if (t < 0 || t >= T || l < 0 || l >= L) { tip.style.display = "none"; return; }
    showTip(e, `<b>L${l} · pos ${d.skip + t} (${esc(d.tokens[t])})</b><br>` +
        `<span class="r">conceptness: ${d.probe_scores[l][t].toPrecision(3)} · rank: ${d.probe_ranks[l][t]}</span>`);
  };
  canvas.onmouseleave = () => tip.style.display = "none";
  return wrap;
}

function buildGrid(d) {
  const probeMode = !!d.probe_scores;
  const T = d.tokens.length;
  const vmax = probeMode ? Math.max(...d.probe_scores.flat()) : 0;
  let html = "<table><tr><th>layer</th>" +
      d.tokens.map((t, i) => `<th class="${d.roles[i] ? "gen" : ""}">${esc(t)}</th>`).join("") + "</tr>";
  for (let l = 0; l < d.n_layers; l++) {
    html += `<tr><td class="layer">L${l}</td>`;
    for (let t = 0; t < T; t++) {
      const top = d.grid[l][t];
      const bg = probeMode ? scoreColor(d.probe_scores[l][t], vmax) : heatColor(top[0].p);
      const label = probeMode ? d.probe_scores[l][t].toPrecision(2) : esc(top[0].tok);
      html += `<td data-l="${l}" data-t="${t}" style="background:${bg}">${label}</td>`;
    }
    html += "</tr>";
  }
  html += "</table>";
  const wrap = document.createElement("div");
  wrap.className = "gridwrap";
  wrap.innerHTML = html;
  wrap.querySelectorAll("td[data-l]").forEach(td => {
    td.onmousemove = e => {
      const l = +td.dataset.l, t = +td.dataset.t;
      const top = d.grid[l][t];
      let s = `<b>L${l} · pos ${d.skip + t} (${esc(d.tokens[t])})</b><br>`;
      s += top.map(x => `${esc(x.tok)} <span class="p">${(x.p*100).toFixed(1)}%</span>`).join("<br>");
      if (probeMode) s += `<br><span class="r">conceptness: ${d.probe_scores[l][t].toPrecision(3)} · rank: ${d.probe_ranks[l][t]}</span>`;
      showTip(e, s);
    };
    td.onmouseleave = () => tip.style.display = "none";
  });
  return wrap;
}

function renderTurn(holder, d) {
  holder.innerHTML = "";
  if (d.probe_scores) holder.appendChild(buildHeatmap(d));
  holder.appendChild(buildGrid(d));
}

function newSession(defaults) {
  const s = { messages: [], shownTokens: 0, turns: [], archived: false };
  const root = document.createElement("div");
  root.className = "session";
  const content = document.createElement("div");
  const composer = document.createElement("div");
  composer.className = "composer";
  composer.innerHTML = `
    <input class="msg" placeholder="Message (e.g. Think about cars while answering: what color is the sky?)"/>
    <select class="lens"><option value="jlens">J-lens</option><option value="logit">logit lens</option></select>
    <input class="probe" type="text" placeholder="probe token (e.g. ' car')" size="16"/>
    <label class="tmpl"><input class="template" type="checkbox" checked> chat template</label>
    <label class="temp">temp <input class="tempval" type="text" value="0.7" size="3"></label>
    <button class="send">send</button>
    <button class="newchat">new chat</button>
    <span class="status"></span>`;
  root.appendChild(content);
  root.appendChild(composer);
  document.getElementById("chats").appendChild(root);
  const el = c => composer.querySelector(c);
  if (defaults) {
    el(".lens").value = defaults.lens;
    el(".probe").value = defaults.probe;
    el(".template").checked = defaults.template;
    el(".tempval").value = defaults.temp;
  }

  function addBubble(role, text) {
    const div = document.createElement("div");
    div.className = "bubble " + role;
    div.textContent = text;
    content.appendChild(div);
  }

  async function post(body) {
    const r = await fetch(`${API}/api/chat`, {method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }

  async function send() {
    const text = el(".msg").value.trim();
    if (!text || s.archived) return;
    s.messages.push({role: "user", content: text});
    addBubble("user", text);
    el(".msg").value = "";
    el(".status").textContent = "running…";
    el(".send").disabled = true;
    try {
      const d = await post({messages: s.messages, lens: el(".lens").value,
        probe: el(".probe").value, template: el(".template").checked,
        temperature: parseFloat(el(".tempval").value) || 0, skip_tokens: s.shownTokens});
      const holder = document.createElement("div");
      content.appendChild(holder);
      renderTurn(holder, d);
      addBubble("assistant", d.reply);
      s.messages.push({role: "assistant", content: d.reply});
      s.turns.push({end: s.messages.length, skip: d.skip, template: el(".template").checked, holder});
      s.shownTokens = d.total_tokens;
      el(".status").textContent = `${d.tokens.length} new tokens × ${d.n_layers} layers — temp ${d.temperature}, seed ${d.seed}`;
      el(".status").title = d.prompt_used;
    } catch (e) {
      el(".status").textContent = "error: " + e.message;
      s.messages.pop();
    } finally {
      el(".send").disabled = false;
      composer.scrollIntoView({behavior: "smooth"});
    }
  }

  async function relens() {
    if (!s.turns.length) return;
    el(".status").textContent = "re-reading…";
    try {
      for (const turn of s.turns) {
        const d = await post({messages: s.messages.slice(0, turn.end),
          lens: el(".lens").value, probe: el(".probe").value, template: turn.template,
          skip_tokens: turn.skip, reuse_reply: true});
        renderTurn(turn.holder, d);
      }
      el(".status").textContent = `re-read with ${el(".lens").value}` +
          (el(".probe").value ? ` / probe "${el(".probe").value}"` : "");
    } catch (e) {
      el(".status").textContent = "error: " + e.message;
    }
  }

  function archive() {
    if (s.archived) return;
    s.archived = true;
    composer.classList.add("archived");
    el(".lens").onchange = relens;
    el(".probe").onchange = relens;
    const defaults = {lens: el(".lens").value, probe: el(".probe").value,
                      template: el(".template").checked, temp: el(".tempval").value};
    newSession(defaults);
  }

  el(".send").onclick = send;
  el(".newchat").onclick = archive;
  el(".msg").addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  el(".probe").addEventListener("keydown", e => {
    if (e.key === "Enter") (s.archived ? relens() : send());
  });
  el(".msg").focus();
  return s;
}

newSession();
</script>
</body>
</html>
